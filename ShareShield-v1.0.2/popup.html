<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareShield Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="title-row">
        <h1>ShareShield</h1>
        <span id="statusIndicator" class="status-badge active">Active</span>
      </div>
      <div class="mode-row">
        <label for="modeSelect" class="mode-label">Mode:</label>
        <select id="modeSelect" class="mode-select">
          <option value="blur">Blur</option>
          <option value="scramble">Scramble</option>
        </select>
      </div>
      <div class="button-row">
        <button id="toggleBtn" class="btn btn-danger">Disable</button>
      </div>
    </header>

    <main>
      <section class="config-section">
        <h2>Configuration</h2>
        <textarea id="configEditor" rows="15" placeholder="Enter your config JSON here..."></textarea>
        
        <div class="button-group">
          <button id="saveConfig" class="btn btn-primary">Save Config</button>
          <button id="resetConfig" class="btn btn-secondary">Reset to Default</button>
        </div>

        <div class="button-group">
          <label for="importConfig" class="btn btn-secondary">
            Import Config
            <input type="file" id="importConfig" accept=".json" style="display: none;">
          </label>
        </div>

        <div id="status" class="status"></div>
      </section>

      <section class="info-section">
        <h3>Quick Guide</h3>
        <ul>
          <li><strong>Selectors:</strong> CSS selectors to blur elements</li>
          <li><strong>Regex:</strong> Patterns to match and blur text content</li>
          <li><strong>Ignore:</strong> Exceptions to prevent blurring</li>
        </ul>
        
      </section>
    </main>
  </div>

  <script src="types.js"></script>
  <script src="popup.js"></script>
</body>
</html>
